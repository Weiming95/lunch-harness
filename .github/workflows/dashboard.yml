name: dashboard

# Re-render docs/index.html whenever state changes (e.g. the Vercel webhook
# commits a new meal to data/**), so GitHub Pages stays fresh.
on:
  push:
    branches: [main]
    paths: ["data/**"]
  workflow_dispatch: {}

concurrency:
  group: lunch-harness-state
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Render dashboard
        env:
          DAILY_CALORIE_TARGET: ${{ vars.DAILY_CALORIE_TARGET }}
        run: python3 harness.py --dashboard
      - name: Commit docs
        run: |
          git config user.name "lunch-harness[bot]"
          git config user.email "actions@github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "No dashboard change."
            exit 0
          fi
          git commit -m "chore: refresh dashboard [skip ci]"
          for i in 1 2 3 4 5; do
            if git push; then echo "pushed"; exit 0; fi
            echo "push rejected; rebasing (attempt $i)"
            git pull --rebase --autostash origin main || true
            sleep $((RANDOM % 5 + 2))
          done
          echo "push failed after retries"; exit 1
