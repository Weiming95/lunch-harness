name: lunch-suggest

# Weekday late-morning lunch suggestion near 1 Depot Rd, informed by recent meals.
on:
  schedule:
    - cron: "50 3 * * 1-5" # 03:50 UTC = 11:50 SGT, Mon-Fri
  workflow_dispatch: {}

concurrency:
  group: lunch-harness-state
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  suggest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Suggest lunch
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          OPENCODE_MODEL: ${{ secrets.OPENCODE_MODEL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          DAILY_CALORIE_TARGET: ${{ vars.DAILY_CALORIE_TARGET }}
        run: python3 harness.py --suggest
      - name: Commit updated state
        run: |
          git config user.name "lunch-harness[bot]"
          git config user.email "actions@github.com"
          git add data docs
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: daily lunch suggestion [skip ci]"
          # Rebase-and-retry: another run (or Pages) may have advanced main.
          for i in 1 2 3 4 5; do
            if git push; then echo "pushed"; exit 0; fi
            echo "push rejected; rebasing (attempt $i)"
            git pull --rebase --autostash origin main || true
            sleep $((RANDOM % 5 + 2))
          done
          echo "push failed after retries"; exit 1
